site_name: Oferta Académica UTPL
site_url: https://universidad-Tecnica-de-Loja.github.io/
site_description: Portal oficial de carreras y facultades de la UTPL.
site_author: Universidad Técnica Particular de Loja

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Inicio: index.md
  - Ciencias Económicas: economicas.md
  - Ingenierías y Arquitectura: ingenierias.md
  - Ciencias Sociales y Humanidades: sociales.md
  - Ciencias de la Salud: salud.md

plugins:
  - search
